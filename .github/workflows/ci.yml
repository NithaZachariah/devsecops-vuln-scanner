name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t vuln-scanner .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: pytest tests/ || true

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Security Scan
        run: echo "Running security checks..."

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Deploy Step
        run: echo "Deploying to Kubernetes..."
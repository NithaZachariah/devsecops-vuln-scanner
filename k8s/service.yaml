apiVersion: v1
kind: Service
metadata:
  name: vuln-scanner-service
spec:
  selector:
    app: vuln-scanner
  type: NodePort          # Use LoadBalancer on cloud (AWS/GCP/Azure)
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080     # Access via http://<node-ip>:30080